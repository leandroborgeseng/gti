# Validação contínua: TypeScript em raiz, backend NestJS e frontend Next.js.
# Os apps não possuem package-lock.json próprio; usa-se npm install no CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck

  typecheck-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run prisma:generate
      - run: npm run typecheck

  typecheck-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
